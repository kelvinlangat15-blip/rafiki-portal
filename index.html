<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verified Exam Hub</title>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    .hidden { display: none !important; }
    .section { background: #f4f4f4; padding: 2rem; border-radius: 12px; }
    input, button { display: block; width: 100%; margin-bottom: 1rem; padding: 0.75rem; font-size: 1rem; }
    .eye-btn { background: none; border: none; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; }
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 3rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: 0.5rem; border: 1px solid #ccc; text-align: left; }
    .error { color: red; margin-bottom: 1rem; }
    .success { color: green; margin-bottom: 1rem; }
    a { color: #1a73e8; cursor: pointer; text-decoration: underline; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div id="authSection">
    <h2>Verified Exam Hub — Register or Login</h2>
    <button id="showRegisterBtn">Register</button>
    <button id="showLoginBtn">Login</button>

    <!-- Register Form -->
    <div id="registerForm" class="section hidden">
      <h3>Register</h3>
      <div class="error" id="regError"></div>
      <input type="text" id="regName" placeholder="Full Name" required>
      <input type="email" id="regEmail" placeholder="Email (min 6 characters)" required minlength="6">
      <input type="tel" id="regPhone" placeholder="Phone Number" required>
      <div class="password-wrapper">
        <input type="password" id="regPassword" placeholder="Password (min 6 chars)" required minlength="6">
        <button type="button" class="eye-btn" onclick="togglePassword('regPassword', this)">👁️</button>
      </div>
      <div class="password-wrapper">
        <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required>
        <button type="button" class="eye-btn" onclick="togglePassword('regConfirmPassword', this)">👁️</button>
      </div>
      <button onclick="register()">Register</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm" class="section hidden">
      <h3>Login</h3>
      <div class="error" id="loginError"></div>
      <input type="email" id="loginEmail" placeholder="Email">
      <div class="password-wrapper">
        <input type="password" id="loginPassword" placeholder="Password">
        <button type="button" class="eye-btn" onclick="togglePassword('loginPassword', this)">👁️</button>
      </div>
      <button onclick="login()">Login</button>
      <p style="text-align: center; margin-top: 0.5rem;">
        <a onclick="showResetPasswordForm()">Forgot Password?</a>
      </p>
    </div>

    <!-- Password Reset Form (hidden by default) -->
    <div id="resetPasswordForm" class="section hidden">
      <h3>Reset Password</h3>
      <div class="error" id="resetError"></div>
      <div class="success" id="resetSuccess"></div>
      <input type="email" id="resetEmail" placeholder="Enter your registered email" required>
      <button onclick="resetPassword()">Send Reset Link</button>
      <p style="text-align: center; margin-top: 0.5rem;">
        <a onclick="goBackToLogin()">Back to Login</a>
      </p>
    </div>
  </div>

  <!-- Other sections remain the same -->
  <div id="messageSection" class="section hidden">
    <h2 id="messageTitle"></h2>
    <p id="messageText"></p>
    <button id="requestReapprovalBtn" class="hidden" onclick="requestReapproval()">Request Re‑approval</button>
    <button onclick="signOutUser()">Sign Out</button>
  </div>

  <div id="userDashboard" class="section hidden">
    <h2>My Private Workspace</h2>
    <p>Welcome, <span id="userName"></span></p>
    <textarea id="contentEditor" rows="10" placeholder="Your private exam content — no one else can see it."></textarea>
    <button onclick="saveContent()">Save</button>
    <button onclick="signOutUser()">Sign Out</button>
  </div>

  <div id="adminPanel" class="section hidden">
    <h2>Admin Dashboard</h2>
    <div id="adminError" class="error"></div>
    <table id="usersTable">
      <thead>
        <tr>
          <th>Name</th><th>Email</th><th>Phone</th><th>Status</th><th>Days Left</th><th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button onclick="signOutUser()">Sign Out</button>
  </div>

  <script>
    // ✅ Your Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBOODA3CkQhKWG4vqP73FFMZ9ld6e23JFs",
      authDomain: "verifief-exam-hub.firebaseapp.com",
      projectId: "verifief-exam-hub",
      storageBucket: "verifief-exam-hub.firebasestorage.app",
      messagingSenderId: "46233995254",
      appId: "1:46233995254:web:643d23a9b4e7d6e787e9d7"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // --- UI Helpers ---
    function togglePassword(fieldId, btn) {
      const field = document.getElementById(fieldId);
      field.type = field.type === 'password' ? 'text' : 'password';
      btn.textContent = field.type === 'password' ? '👁️' : '🙈';
    }

    function showSection(sectionId) {
      ['authSection', 'messageSection', 'userDashboard', 'adminPanel'].forEach(id => {
        document.getElementById(id).classList.add('hidden');
      });
      document.getElementById(sectionId).classList.remove('hidden');
    }

    function showAuthForm(formId) {
      // Hide all auth sub-forms
      ['registerForm', 'loginForm', 'resetPasswordForm'].forEach(id => {
        document.getElementById(id).classList.add('hidden');
      });
      document.getElementById(formId).classList.remove('hidden');
    }

    // --- Auth Handlers ---
    document.getElementById('showRegisterBtn').addEventListener('click', () => {
      showAuthForm('registerForm');
    });
    document.getElementById('showLoginBtn').addEventListener('click', () => {
      showAuthForm('loginForm');
    });

    async function register() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirmPassword').value;
      document.getElementById('regError').textContent = '';

      if (!name || !email || !phone || !password) return;
      if (password !== confirm) {
        document.getElementById('regError').textContent = 'Passwords do not match.';
        return;
      }
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        await db.collection('users').doc(cred.user.uid).set({
          name, email, phone,
          status: 'pending',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        await auth.signOut();
        showMessage('Registration Successful', 'Your account is pending admin approval. You can close this page.');
      } catch (e) {
        document.getElementById('regError').textContent = e.message;
      }
    }

    async function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      document.getElementById('loginError').textContent = '';
      try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        const user = cred.user;

        // Check if admin (from Firestore admins collection)
        const adminDoc = await db.collection('admins').doc(user.uid).get();
        const isAdmin = adminDoc.exists && adminDoc.data().role === 'admin';

        const userDoc = await db.collection('users').doc(user.uid).get();
        if (!userDoc.exists) {
          await auth.signOut();
          showMessage('Error', 'Account data not found. Contact admin.');
          return;
        }
        const data = userDoc.data();
        const status = data.status;

        if (status === 'pending') {
          await auth.signOut();
          showMessage('Pending Approval', 'Your account is awaiting admin approval.');
          return;
        }
        if (status === 'removed') {
          await auth.signOut();
          showMessage('Account Removed', 'Your account has been removed. Request to be approved again.');
          document.getElementById('requestReapprovalBtn').classList.remove('hidden');
          return;
        }
        if (status === 'approved') {
          const expiry = data.expiry ? data.expiry.toDate() : null;
          if (expiry && new Date() > expiry) {
            await auth.signOut();
            showMessage('Account Expired', 'Your account has expired. Request to be approved again.');
            document.getElementById('requestReapprovalBtn').classList.remove('hidden');
            return;
          }
          if (isAdmin) {
            loadAdminPanel();
            showSection('adminPanel');
          } else {
            document.getElementById('userName').textContent = data.name;
            loadUserContent(user.uid);
            showSection('userDashboard');
          }
        }
      } catch (e) {
        document.getElementById('loginError').textContent = e.message;
      }
    }

    // --- Password Reset ---
    function showResetPasswordForm() {
      showAuthForm('resetPasswordForm');
      // Clear any previous errors / success
      document.getElementById('resetError').textContent = '';
      document.getElementById('resetSuccess').textContent = '';
    }

    function goBackToLogin() {
      showAuthForm('loginForm');
    }

    async function resetPassword() {
      const email = document.getElementById('resetEmail').value.trim();
      document.getElementById('resetError').textContent = '';
      document.getElementById('resetSuccess').textContent = '';

      if (!email) {
        document.getElementById('resetError').textContent = 'Please enter your email address.';
        return;
      }
      try {
        await auth.sendPasswordResetEmail(email);
        document.getElementById('resetSuccess').textContent = 'Password reset email sent! Check your inbox (and spam folder).';
      } catch (e) {
        document.getElementById('resetError').textContent = e.message;
      }
    }

    function showMessage(title, text) {
      document.getElementById('messageTitle').textContent = title;
      document.getElementById('messageText').textContent = text;
      document.getElementById('requestReapprovalBtn').classList.add('hidden');
      showSection('messageSection');
    }

    async function requestReapproval() {
      const user = auth.currentUser;
      if (!user) return;
      try {
        await db.collection('users').doc(user.uid).update({ status: 'pending' });
        await auth.signOut();
        showMessage('Request Sent', 'Your re‑approval request has been sent to the admin.');
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    function signOutUser() {
      auth.signOut().then(() => {
        showSection('authSection');
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('resetPasswordForm').classList.add('hidden');
      });
    }

    // --- User Content ---
    async function loadUserContent(uid) {
      const doc = await db.collection('userData').doc(uid).collection('private').doc('content').get();
      document.getElementById('contentEditor').value = doc.exists ? doc.data().content || '' : '';
    }

    async function saveContent() {
      const user = auth.currentUser;
      if (!user) return;
      try {
        await db.collection('userData').doc(user.uid).collection('private').doc('content').set({
          content: document.getElementById('contentEditor').value
        });
        alert('Saved!');
      } catch (e) {
        alert('Save failed: ' + e.message);
      }
    }

    // --- Admin Functions ---
    async function loadAdminPanel() {
      try {
        const snapshot = await db.collection('users').get();
        const tbody = document.querySelector('#usersTable tbody');
        tbody.innerHTML = '';
        snapshot.forEach(doc => {
          const data = doc.data();
          const row = tbody.insertRow();
          row.innerHTML = `
            <td>${data.name}</td>
            <td>${data.email}</td>
            <td>${data.phone}</td>
            <td>${data.status}</td>
            <td>${data.status === 'approved' ? daysLeft(data.expiry) : '—'}</td>
            <td>${actionButtons(doc.id, data.status)}</td>
          `;
        });
      } catch (e) {
        document.getElementById('adminError').textContent = 'Error loading users. Ensure you have admin rights.';
      }
    }

    function daysLeft(expiryField) {
      if (!expiryField) return '—';
      const expiry = expiryField.toDate();
      const diff = Math.floor((expiry - new Date()) / (1000 * 60 * 60 * 24));
      return diff > 0 ? diff : 'Expired';
    }

    function actionButtons(uid, status) {
      if (status === 'pending') {
        return `<button onclick="approveUser('${uid}')">Approve</button>`;
      }
      if (status === 'approved') {
        return `<button onclick="removeUser('${uid}')">Remove</button>`;
      }
      if (status === 'removed' || status === 'expired') {
        return `<button onclick="approveUser('${uid}')">Re‑approve</button>`;
      }
      return '';
    }

    async function approveUser(uid) {
      const expiryDate = new Date(Date.now() + 365 * 24 * 60 * 60 * 1000);
      try {
        await db.collection('users').doc(uid).update({
          status: 'approved',
          approvalDate: firebase.firestore.FieldValue.serverTimestamp(),
          expiry: firebase.firestore.Timestamp.fromDate(expiryDate)
        });
        loadAdminPanel();
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    async function removeUser(uid) {
      if (!confirm('Remove this user? They will lose access.')) return;
      try {
        await db.collection('users').doc(uid).update({ status: 'removed' });
        loadAdminPanel();
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }
  </script>
</body>
</html>
